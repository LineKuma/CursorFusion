name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  # ============================================
  # 代码质量检查 (Lint)
  # ============================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check --if-present

  # ============================================
  # 单元测试 (Unit Tests)
  # ============================================
  test-unit:
    name: Unit Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:unit --
        env:
          CI: true

      - name: Upload unit coverage report
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-report
          path: coverage/
          retention-days: 7

  # ============================================
  # 集成测试 (Integration Tests)
  # ============================================
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration -- --no-coverage
        env:
          CI: true

      - name: Upload integration coverage report
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage-report
          path: coverage/
          retention-days: 7

  # ============================================
  # 端到端测试 (E2E Tests)
  # ============================================
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true

  # ============================================
  # 覆盖率汇总与门禁 (Coverage Gate)
  # ============================================
  coverage:
    name: Coverage Gate
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: unit-coverage-report
          path: coverage/unit/

      - name: Download integration coverage
        uses: actions/download-artifact@v4
        with:
          name: integration-coverage-report
          path: coverage/integration/

      - name: Merge coverage reports
        run: |
          npx istanbul-merge \
            coverage/unit/coverage-final.json \
            coverage/integration/coverage-final.json \
            coverage/merged-coverage.json 2>/dev/null || echo "Merge skipped"
          echo "=== Coverage Summary ==="
          if [ -f coverage/unit/coverage-summary.json ]; then
            cat coverage/unit/coverage-summary.json | node -e "
              const d = require('fs').readFileSync(0, 'utf-8');
              const s = JSON.parse(d);
              console.log('Unit Test Coverage:');
              for (const f of s) {
                if (f.filename === 'All files') {
                  console.log(\`  Statements: \${f.statements.pct}%\`);
                  console.log(\`  Branches:   \${f.branches.pct}%\`);
                  console.log(\`  Functions:  \${f.functions.pct}%\`);
                  console.log(\`  Lines:      \${f.lines.pct}%\`);
                }
              }
            "
          fi

      - name: Coverage comment on PR
        if: always()
        uses: mad9000/actions-comment-pull-request@v2
        with:
          filePath: coverage/unit/lcov.info || coverage/unit/cobertura-coverage.xml
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # 构建
  # ============================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration, test-e2e]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7

  # ============================================
  # 跨平台构建验证
  # ============================================
  build-matrix:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [test-unit, test-integration, test-e2e]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
